name: Nightly Sales Report

on:
  schedule:
    # 3 AM UTC = 10 PM EST (Nov–Mar) / 11 PM EDT (Mar–Nov)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Single date (YYYY-MM-DD). Leave blank for today."
        required: false
      from_date:
        description: "Backfill start date (YYYY-MM-DD)"
        required: false
      to_date:
        description: "Backfill end date (YYYY-MM-DD)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sales-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly sales report
        env:
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
          SQUARE_DONATION_ITEM_NAME: ${{ secrets.SQUARE_DONATION_ITEM_NAME }}
          SQUARE_TICKET_ITEM_NAME: ${{ secrets.SQUARE_TICKET_ITEM_NAME }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.from_date }}" ] && [ -n "${{ github.event.inputs.to_date }}" ]; then
            ARGS="--from ${{ github.event.inputs.from_date }} --to ${{ github.event.inputs.to_date }}"
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }}"
          fi
          python src/main.py $ARGS
